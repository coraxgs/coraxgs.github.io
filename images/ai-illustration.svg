<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Neural network visualization -->
  <g stroke="url(#aiGrad)" stroke-width="2" fill="none" filter="url(#glow)">
    <!-- Input layer -->
    <circle cx="100" cy="150" r="15" fill="#00ffcc"/>
    <circle cx="100" cy="250" r="15" fill="#00ffcc"/>
    <circle cx="100" cy="350" r="15" fill="#00ffcc"/>
    <circle cx="100" cy="450" r="15" fill="#00ffcc"/>
    
    <!-- Hidden layer 1 -->
    <circle cx="300" cy="100" r="12" fill="#0066ff"/>
    <circle cx="300" cy="200" r="12" fill="#0066ff"/>
    <circle cx="300" cy="300" r="12" fill="#0066ff"/>
    <circle cx="300" cy="400" r="12" fill="#0066ff"/>
    <circle cx="300" cy="500" r="12" fill="#0066ff"/>
    
    <!-- Hidden layer 2 -->
    <circle cx="500" cy="150" r="12" fill="#00d4aa"/>
    <circle cx="500" cy="250" r="12" fill="#00d4aa"/>
    <circle cx="500" cy="350" r="12" fill="#00d4aa"/>
    <circle cx="500" cy="450" r="12" fill="#00d4aa"/>
    
    <!-- Output layer -->
    <circle cx="700" cy="250" r="15" fill="#ff6b35"/>
    <circle cx="700" cy="350" r="15" fill="#ff6b35"/>
    
    <!-- Connections -->
    <line x1="115" y1="150" x2="285" y2="100" opacity="0.6"/>
    <line x1="115" y1="150" x2="285" y2="200" opacity="0.8"/>
    <line x1="115" y1="150" x2="285" y2="300" opacity="0.4"/>
    
    <line x1="115" y1="250" x2="285" y2="200" opacity="0.9"/>
    <line x1="115" y1="250" x2="285" y2="300" opacity="0.7"/>
    <line x1="115" y1="250" x2="285" y2="400" opacity="0.5"/>
    
    <line x1="315" y1="200" x2="485" y2="150" opacity="0.8"/>
    <line x1="315" y1="200" x2="485" y2="250" opacity="0.9"/>
    <line x1="315" y1="300" x2="485" y2="250" opacity="0.7"/>
    <line x1="315" y1="300" x2="485" y2="350" opacity="0.8"/>
    
    <line x1="515" y1="250" x2="685" y2="250" opacity="0.9"/>
    <line x1="515" y1="350" x2="685" y2="350" opacity="0.8"/>
  </g>
  
  <!-- Data flow animation -->
  <g fill="#00ffcc" opacity="0.8">
    <circle cx="150" cy="300" r="3">
      <animate attributeName="cx" values="150;200;250;300" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.5;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Inter, sans-serif" font-size="36" font-weight="700" 
        text-anchor="middle" fill="url(#aiGrad)">AI & Machine Learning</text>
</svg>